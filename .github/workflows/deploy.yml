name: Deploy

# Static SPA → Cloudflare Pages. Requires repo secrets CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID, and a Pages project named "debateflow".
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @debateflow/web build
        env:
          # Safety rail: never allow a real key to be inlined in deploy builds.
          VITE_GEMINI_API_KEY: __DEPLOY_DUMMY_KEY_DO_NOT_USE__
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=debateflow
